<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="theme-color" content="#0f1117" />
  <meta name="description" content="Elevare Clocking – track hours, send invoices" />
  <link rel="manifest" href="manifest.json" />
  <link rel="apple-touch-icon" href="icon-192.png" />
  <title>Elevare Clocking</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:ital,wght@0,300;0,400;0,500;1,300&family=Syne:wght@400;600;700;800&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <div class="noise"></div>

  <!-- LOGIN SCREEN -->
  <div id="login-screen" class="login-screen">
    <div class="login-box">
      <div class="login-logo">⏱</div>
      <h1 class="login-title">Elevare<br>Clocking</h1>
      <p class="login-sub">Sign in to access your time records</p>
      <button id="google-signin-btn" class="btn-google">
        <svg width="18" height="18" viewBox="0 0 48 48"><path fill="#EA4335" d="M24 9.5c3.54 0 6.71 1.22 9.21 3.6l6.85-6.85C35.9 2.38 30.47 0 24 0 14.62 0 6.51 5.38 2.56 13.22l7.98 6.19C12.43 13.72 17.74 9.5 24 9.5z"/><path fill="#4285F4" d="M46.98 24.55c0-1.57-.15-3.09-.38-4.55H24v9.02h12.94c-.58 2.96-2.26 5.48-4.78 7.18l7.73 6c4.51-4.18 7.09-10.36 7.09-17.65z"/><path fill="#FBBC05" d="M10.53 28.59c-.48-1.45-.76-2.99-.76-4.59s.27-3.14.76-4.59l-7.98-6.19C.92 16.46 0 20.12 0 24c0 3.88.92 7.54 2.56 10.78l7.97-6.19z"/><path fill="#34A853" d="M24 48c6.48 0 11.93-2.13 15.89-5.81l-7.73-6c-2.15 1.45-4.92 2.3-8.16 2.3-6.26 0-11.57-4.22-13.47-9.91l-7.98 6.19C6.51 42.62 14.62 48 24 48z"/></svg>
        Sign in with Google
      </button>
      <p class="login-note">Your data is private and stored securely in the cloud</p>
    </div>
  </div>

  <!-- MAIN APP -->
  <div id="app" hidden>
    <header>
      <div class="logo">
        <span class="logo-mark">⏱</span>
        <span class="logo-text">Elevare</span>
      </div>
      <nav>
        <button class="nav-btn active" data-view="log">Log</button>
        <button class="nav-btn" data-view="history">History</button>
        <button class="nav-btn" data-view="invoice">Invoice</button>
      </nav>
      <button id="signout-btn" class="btn-signout" title="Sign out">↪</button>
    </header>

    <main>
      <!-- LOG VIEW -->
      <section id="view-log" class="view active">
        <div class="section-header">
          <h1>New Entry</h1>
          <p class="subtitle">Record your time &amp; notes</p>
        </div>

        <form id="entry-form" class="entry-form" novalidate>
          <div class="field">
            <label for="entry-date">Date</label>
            <input type="date" id="entry-date" required />
          </div>
          <div class="form-row two-col">
            <div class="field">
              <label for="clock-in">Clock In</label>
              <input type="time" id="clock-in" required />
            </div>
            <div class="field">
              <label for="clock-out">Clock Out</label>
              <input type="time" id="clock-out" required />
            </div>
          </div>
          <div class="field">
            <label for="notes">Notes <span class="label-hint">What was charged in these hours?</span></label>
            <textarea id="notes" rows="4" placeholder="e.g. Designed homepage layout, fixed nav bug, client call…"></textarea>
          </div>
          <div class="duration-preview" id="duration-preview" hidden>
            <span class="dp-label">Duration</span>
            <span class="dp-value" id="dp-value">—</span>
            <span class="dp-rate" id="dp-rate">—</span>
          </div>
          <div class="form-actions">
            <button type="submit" class="btn-primary" id="save-btn">Save Entry</button>
            <button type="button" class="btn-ghost" id="clear-btn">Clear</button>
          </div>
        </form>

        <div class="month-summary" id="month-summary"></div>
      </section>

      <!-- HISTORY VIEW -->
      <section id="view-history" class="view">
        <div class="section-header">
          <h1>History</h1>
          <div class="filter-row">
            <select id="filter-month"></select>
            <button class="btn-ghost btn-sm" id="delete-all-btn">Clear month</button>
          </div>
        </div>
        <div id="history-list" class="history-list"></div>
      </section>

      <!-- INVOICE VIEW -->
      <section id="view-invoice" class="view">
        <div class="section-header">
          <h1>Invoice</h1>
          <p class="subtitle">Generate &amp; send monthly invoice</p>
        </div>
        <div class="invoice-config">
          <div class="form-row two-col">
            <div class="field">
              <label for="inv-month">Month</label>
              <select id="inv-month"></select>
            </div>
            <div class="field">
              <label for="inv-rate">Rate (£/hr)</label>
              <input type="number" id="inv-rate" value="15" min="1" step="0.5" />
            </div>
          </div>
          <div class="form-row two-col">
            <div class="field">
              <label for="inv-your-name">Your Name</label>
              <input type="text" id="inv-your-name" placeholder="Jane Smith" />
            </div>
            <div class="field">
              <label for="inv-invoice-no">Invoice No.</label>
              <input type="text" id="inv-invoice-no" placeholder="INV-001" />
            </div>
          </div>
          <div class="field">
            <label for="inv-client">Client Name / Company</label>
            <input type="text" id="inv-client" placeholder="Acme Ltd" />
          </div>
          <div class="field">
            <label for="inv-client-addr">Client Address</label>
            <textarea id="inv-client-addr" rows="3" placeholder="123 High Street&#10;London&#10;EC1A 1BB"></textarea>
          </div>
          <div class="field">
            <label for="inv-payment">Payment Details</label>
            <textarea id="inv-payment" rows="2" placeholder="Sort code: 00-00-00  Account: 12345678"></textarea>
          </div>
          <div class="invoice-actions">
            <button class="btn-primary" id="preview-invoice-btn">Preview Invoice</button>
            <button class="btn-secondary" id="print-invoice-btn">Print / Save PDF</button>
            <button class="btn-ghost" id="email-invoice-btn">Open in Email</button>
          </div>
        </div>
        <div id="invoice-preview" class="invoice-preview" hidden></div>
      </section>
    </main>
  </div>

  <!-- EDIT MODAL -->
  <div id="edit-modal" class="modal-overlay" hidden>
    <div class="modal">
      <div class="modal-header">
        <h2>Edit Entry</h2>
        <button class="modal-close" id="modal-close">✕</button>
      </div>
      <form id="edit-form" novalidate>
        <div class="field">
          <label for="edit-date">Date</label>
          <input type="date" id="edit-date" required />
        </div>
        <div class="form-row two-col">
          <div class="field">
            <label for="edit-in">Clock In</label>
            <input type="time" id="edit-in" required />
          </div>
          <div class="field">
            <label for="edit-out">Clock Out</label>
            <input type="time" id="edit-out" required />
          </div>
        </div>
        <div class="field">
          <label for="edit-notes">Notes</label>
          <textarea id="edit-notes" rows="4"></textarea>
        </div>
        <div class="form-actions">
          <button type="submit" class="btn-primary">Update</button>
          <button type="button" class="btn-danger" id="delete-entry-btn">Delete</button>
        </div>
      </form>
    </div>
  </div>

  <div id="toast" class="toast" hidden></div>
  <script type="module" src="app.js"></script>
</body>
</html>
